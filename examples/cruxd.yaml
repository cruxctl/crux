server:
  address: 127.0.0.1
  port: 7700
  # Trade-off: lower values fail stuck clients faster; higher values tolerate slow command output.
  readTimeoutSeconds: 15
  # Trade-off: higher values support long waited runs; lower values release HTTP workers faster.
  writeTimeoutSeconds: 300
  # Trade-off: higher values let in-flight local jobs finish during shutdown; lower values stop faster.
  shutdownGraceSeconds: 15

store:
  # Local JSON state for the MVP. Move to SQLite/Postgres only after the store interface needs concurrent multi-host access.
  path: ~/.local/share/crux/state.json

security:
  # Empty means localhost development without API auth. Set CRUX_API_KEY or this value for shared machines.
  apiKey: ""

runtime:
  # Trade-off: higher concurrency improves throughput but increases CPU/RAM pressure.
  workerConcurrency: 2
  # Trade-off: higher timeout supports long agent jobs; lower timeout recovers stuck jobs faster.
  jobTimeoutSeconds: 900
  # Trade-off: larger output captures more trace detail but grows local state faster.
  maxOutputBytes: 1048576
  # Trade-off: higher timeout tolerates slow CLIs during discovery; lower timeout keeps discovery snappy.
  discoveryTimeoutSeconds: 3
  # Trade-off: debug is noisier but better during adapter work.
  logLevel: info
  defaultNamespace: default
  # Shell agents are disabled by default; enable only for trusted local command specs.
  allowShellCommands: false
  # Trade-off: higher retention improves audit depth but grows the JSON state file.
  traceRetentionEntries: 10000

