id: kimi-cli
name: Kimi CLI
provider: Moonshot AI
binary: kimi
aliases:
  - kimi
config_paths:
  - ~/.kimi
detect:
  command: kimi
  args: ["--version"]
launch:
  command: kimi
  args: ["--work-dir", "{workdir}"]
ready:
  strategy: screen_contains_any
  patterns:
    - "Welcome to Kimi Code CLI"
    - "Send /help"
pty_env:
  NO_COLOR: "1"
  CLICOLOR: "0"
  FORCE_COLOR: "0"
  TERM: xterm-256color
normalize:
  strip_ansi: true
  strip_control_chars: true
  normalize_boxes: true
  normalize_whitespace: true
  remove_spinners: true
  collapse_redraws: true
commands:
  describe:
    command: kimi
    args: ["-h"]
    timeout: 10s
    parse_from: clean_text
    complete_when:
      strategy: process_exit
  usage:
    command: kimi
    args: ["info", "--json"]
    timeout: 10s
    parse_from: clean_text
    complete_when:
      strategy: process_exit
  conversations_ls:
    display: "filesystem scan ~/.kimi/sessions"
    command: sh
    args:
      - "-c"
      - |
        if [ -d "$HOME/.kimi/sessions" ]; then
          find "$HOME/.kimi/sessions" -mindepth 2 -maxdepth 2 -type d -printf '%TY-%Tm-%Td %TH:%TM %f %p\n' | sort -r | head -50
        else
          echo "No Kimi conversations found"
        fi
    timeout: 10s
    parse_from: clean_text
    complete_when:
      strategy: process_exit
