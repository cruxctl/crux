id: kimi-cli
name: Kimi CLI
provider: Moonshot AI
binary: kimi
aliases:
  - kimi
config_paths:
  - ~/.kimi
detect:
  command: kimi
  args: ["--version"]
launch:
  command: kimi
  args: []
ready:
  strategy: screen_contains_any
  patterns:
    - ">"
    - "kimi"
pty_env:
  NO_COLOR: "1"
  CLICOLOR: "0"
  FORCE_COLOR: "0"
  TERM: xterm-256color
normalize:
  strip_ansi: true
  strip_control_chars: true
  normalize_boxes: true
  normalize_whitespace: true
  remove_spinners: true
  collapse_redraws: true
commands:
  describe:
    input: "/help\n"
    timeout: 20s
    parse_from: clean_text
    complete_when:
      strategy: screen_stable
      stable_for_ms: 800
  usage:
    input: "info\n"
    timeout: 20s
    parse_from: clean_text
    complete_when:
      strategy: screen_stable
      stable_for_ms: 800
  conversations_ls:
    input: "/sessions\n"
    timeout: 20s
    parse_from: final_screen
    complete_when:
      strategy: screen_stable
      stable_for_ms: 800
