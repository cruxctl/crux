id: claude-code
name: Claude Code
provider: Anthropic
binary: claude
aliases:
  - claude
config_paths:
  - ~/.claude
  - CLAUDE.md
detect:
  command: claude
  args: ["--version"]
launch:
  command: claude
  args: []
ready:
  strategy: screen_contains_any
  patterns:
    - "? for shortcuts"
    - "Try \""
pty_env:
  NO_COLOR: "1"
  CLICOLOR: "0"
  FORCE_COLOR: "0"
  TERM: xterm-256color
normalize:
  strip_ansi: true
  strip_control_chars: true
  normalize_boxes: true
  normalize_whitespace: true
  remove_spinners: true
  collapse_redraws: true
commands:
  describe:
    command: claude
    args: ["-h"]
    timeout: 10s
    parse_from: clean_text
    complete_when:
      strategy: process_exit
  usage:
    command: claude
    args: ["-p", "/usage", "--output-format", "text", "--no-session-persistence"]
    timeout: 20s
    parse_from: clean_text
    complete_when:
      strategy: process_exit
  conversations_ls:
    display: "filesystem scan ~/.claude/projects"
    command: sh
    args:
      - "-c"
      - |
        if [ -d "$HOME/.claude/projects" ]; then
          find "$HOME/.claude/projects" -maxdepth 2 -type f -name '*.jsonl' -printf '%TY-%Tm-%Td %TH:%TM %f %p\n' | sort -r | head -50
        else
          echo "No Claude Code conversations found"
        fi
    timeout: 10s
    parse_from: clean_text
    complete_when:
      strategy: process_exit
  mcp:
    input: "/mcp\n"
    timeout: 20s
    parse_from: final_screen
    complete_when:
      strategy: screen_stable
      stable_for_ms: 1500
