id: codex
name: OpenAI Codex
provider: OpenAI
binary: codex
aliases:
  - openai-codex
config_paths:
  - ~/.codex
  - AGENTS.md
detect:
  command: codex
  args: ["--version"]
launch:
  command: codex
  args: ["--no-alt-screen"]
ready:
  strategy: screen_contains_any
  patterns:
    - ">"
    - "codex"
    - "What can I help"
pty_env:
  NO_COLOR: "1"
  CLICOLOR: "0"
  FORCE_COLOR: "0"
  TERM: xterm-256color
normalize:
  strip_ansi: true
  strip_control_chars: true
  normalize_boxes: true
  normalize_whitespace: true
  remove_spinners: true
  collapse_redraws: true
commands:
  describe:
    command: codex
    args: ["-h"]
    timeout: 10s
    parse_from: clean_text
    complete_when:
      strategy: process_exit
  usage:
    command: codex
    args: ["login", "status"]
    timeout: 10s
    parse_from: clean_text
    complete_when:
      strategy: process_exit
  conversations_ls:
    display: "filesystem scan ~/.codex/sessions"
    command: sh
    args:
      - "-c"
      - |
        if [ -d "$HOME/.codex/sessions" ]; then
          find "$HOME/.codex/sessions" -type f -name '*.jsonl' -printf '%TY-%Tm-%Td %TH:%TM %f %p\n' | sort -r | head -50
        else
          echo "No Codex conversations found"
        fi
    timeout: 10s
    parse_from: clean_text
    complete_when:
      strategy: process_exit
