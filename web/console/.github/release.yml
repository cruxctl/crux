changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: Breaking Changes
      labels: [breaking]
    - title: Features
      labels: [feature, enhancement]
    - title: Fixes
      labels: [bug, fix]
    - title: Documentation
      labels: [documentation, docs]
    - title: Maintenance
      labels: [chore, dependencies, ci]
    - title: Other Changes
      labels: ["*"]
