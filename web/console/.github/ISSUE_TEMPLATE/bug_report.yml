name: Bug report
description: Report a reproducible Crux Console problem.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include browser, viewport, route, expected behavior, and actual behavior.
    validations:
      required: true
