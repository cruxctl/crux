name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
      - run: go fmt ./...
      - run: git diff --exit-code
      - run: go vet ./...
      - run: go test ./...
      - run: go build ./cmd/crux ./cmd/cruxd

